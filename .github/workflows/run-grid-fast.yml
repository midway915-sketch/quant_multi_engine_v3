name: run-grid-fast

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: "Base config yml"
        required: true
        default: "config/default.yml"
      grid_path:
        description: "Grid config yml"
        required: true
        default: "config/grid_fast.yml"
      out_dir:
        description: "Output directory"
        required: true
        default: "out/grid_fast"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run grid (fast)
        run: |
          mkdir -p "${{ inputs.out_dir }}"
          python -m scripts.run_grid \
            --config "${{ inputs.config_path }}" \
            --grid "${{ inputs.grid_path }}" \
            --out "${{ inputs.out_dir }}"

      # ✅ 실패/성공 상관없이 생성물 위치 확인(디버그)
      - name: Debug - list outputs
        if: always()
        run: |
          echo "[DEBUG] pwd=$(pwd)"
          echo "[DEBUG] workspace=${{ github.workspace }}"
          echo "[DEBUG] out_dir=${{ inputs.out_dir }}"
          echo "----- ls -la out -----"
          ls -la out || true
          echo "----- ls -la out_dir -----"
          ls -la "${{ inputs.out_dir }}" || true
          echo "----- find out_dir (maxdepth 2) -----"
          find "${{ inputs.out_dir }}" -maxdepth 2 -type f -print || true

      # ✅ 특정 파일 지정 X: out_dir 전체를 아티팩트로 올림
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grid-fast-results
          if-no-files-found: warn
          path: |
            ${{ inputs.out_dir }}/