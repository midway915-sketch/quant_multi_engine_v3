name: branch5a-grid

on:
  workflow_dispatch:
    inputs:
      start:
        description: "yfinance start date"
        required: true
        default: "2000-01-01"
      end:
        description: "yfinance end date (blank = today)"
        required: false
        default: ""
      grid_path:
        description: "Grid config yml"
        required: true
        default: "config/grid_branch5a.yml"
      out_dir:
        description: "Output directory"
        required: true
        default: "out/grid_branch5a"
      aggregate_dir:
        description: "Aggregate output directory"
        required: true
        default: "out/grid_branch5a_aggregate"
      buy_cost:
        description: "Buy cost"
        required: true
        default: "0.0005"
      sell_cost:
        description: "Sell cost"
        required: true
        default: "0.0005"

jobs:
  run-grid:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install yfinance pandas numpy pyyaml

      - name: Download prices from yfinance
        run: |
          mkdir -p out/prep
          if [ -n "${{ inputs.end }}" ]; then
            python -m scripts.download_branch5a_prices --out-csv out/prep/prices.csv --start "${{ inputs.start }}" --end "${{ inputs.end }}"
          else
            python -m scripts.download_branch5a_prices --out-csv out/prep/prices.csv --start "${{ inputs.start }}"
          fi

      - name: Run branch5a grid
        run: |
          mkdir -p "${{ inputs.out_dir }}"
          python -m scripts.run_grid_branch5a \
            --prices-csv out/prep/prices.csv \
            --grid-yaml "${{ inputs.grid_path }}" \
            --out-dir "${{ inputs.out_dir }}" \
            --buy-cost "${{ inputs.buy_cost }}" \
            --sell-cost "${{ inputs.sell_cost }}"

      - name: Aggregate branch5a results
        run: |
          mkdir -p "${{ inputs.aggregate_dir }}"
          python -m scripts.aggregate_branch5a \
            --summary-csv "${{ inputs.out_dir }}/summary_merged.csv" \
            --out-dir "${{ inputs.aggregate_dir }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: branch5a-grid-results
          if-no-files-found: error
          path: |
            out/prep/prices.csv
            ${{ inputs.out_dir }}/
            ${{ inputs.aggregate_dir }}/