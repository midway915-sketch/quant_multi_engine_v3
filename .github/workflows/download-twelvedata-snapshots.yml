name: check-twelvedata-intraday-availability

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: 'comma-separated symbols'
        required: true
        default: 'QQQ,SPY,SOXX'
      test_dates:
        description: 'comma-separated YYYY-MM-DD dates'
        required: true
        default: '2025-02-28,2024-02-28,2023-02-28,2022-02-28,2021-02-26,2020-02-28'
      interval:
        description: 'interval'
        required: true
        default: '1min'
      timezone:
        description: 'timezone'
        required: true
        default: 'America/New_York'
      security_type:
        description: 'security type'
        required: true
        default: 'ETF'
      pause_seconds:
        description: 'pause seconds between requests'
        required: true
        default: '10.0'
      out_csv:
        description: 'output csv path'
        required: true
        default: 'data/twelvedata_availability_check/results.csv'

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Validate secret
        run: |
          if [ -z "${TWELVEDATA_API_KEY}" ]; then
            echo "TWELVEDATA_API_KEY secret is missing"
            exit 1
          fi

      - name: Run availability check
        run: |
          mkdir -p "$(dirname '${{ inputs.out_csv }}')"
          python tools/check_twelvedata_intraday_availability.py \
            --api-key "${TWELVEDATA_API_KEY}" \
            --symbols "${{ inputs.symbols }}" \
            --test-dates "${{ inputs.test_dates }}" \
            --interval "${{ inputs.interval }}" \
            --timezone "${{ inputs.timezone }}" \
            --security-type "${{ inputs.security_type }}" \
            --pause-seconds "${{ inputs.pause_seconds }}" \
            --out-csv "${{ inputs.out_csv }}"

      - name: Show results
        run: |
          if [ -f "${{ inputs.out_csv }}" ]; then
            python -c "import csv; from pathlib import Path; p=Path(r'${{ inputs.out_csv }}'); rows=list(csv.reader(p.open('r', encoding='utf-8'))); print('\n'.join([','.join(r) for r in rows[:50]]))"
          else
            echo "results csv not found"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twelvedata-availability-${{ github.run_number }}
          if-no-files-found: error
          path: |
            ${{ inputs.out_csv }}