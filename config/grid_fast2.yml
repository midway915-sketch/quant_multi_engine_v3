  lookback_days: [20]
  drop_threshold: [-0.10]
  hold_days: [5]
  take_profit: [0.06]
  stop_loss: [-0.06]
  candidates:
    - ["QQQ", "SPY", "SOXX"]
  base: ["SPY"]

allocator:
  bull:
    trend: [0.65, 0.70]
    meanrev: [0.00]
    defensive: [0.35, 0.30]   # 합이 1.0 되게(0.65/0.70에 맞춰)
  bear:
    trend: [0.00]
    meanrev: [0.00]
    defensive: [1.00]
  crash:
    trend: [0.00]
    meanrev: [0.00]
    defensive: [1.00]