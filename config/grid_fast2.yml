data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [200]
  min_hold_days: [5]

crash:
  lookback_days: [5, 10]
  threshold: [-0.08, -0.10]

risk_off:
  # ✅ 여기서 방어자산/인버스를 갈아끼우는 실험
  # - SHY_100: 기존 단기채
  # - SGOV_100: 초단기 T-bill (없으면 BIL_100으로 바꿔)
  # - SH_100: SPY -1x 인버스
  # - PSQ_100: QQQ -1x 인버스 (너 코드에 없으면 빼)
  mode: ["SHY_100", "SGOV_100", "SH_100", "PSQ_100"]

trend_engine:
  mom_lookback_days: [126]
  candidates:
    - ["QQQ", "SPY"]
  top_n: [1]

meanrev_engine:
  lookback_days: [20]
  drop_threshold: [-0.10]
  hold_days: [5]
  take_profit: [0.06]
  stop_loss: [-0.06]
  candidates:
    - ["QQQ", "SPY"]
  base: ["SPY"]

allocator:
  bull:
    trend: [0.55, 0.65]
    meanrev: [0.05]
    defensive: [0.40, 0.30]

  # ✅ BEAR/CRASH는 100% risk_off로 보내서 “회피”를 강제
  bear:
    trend: [0.00]
    meanrev: [0.00]
    defensive: [1.00]

  crash:
    trend: [0.00]
    meanrev: [0.00]
    defensive: [1.00]