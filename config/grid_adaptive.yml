# config/grid_adaptive.yml
# Minimal grid for adaptive strategy:
# - keep crash fixed
# - scan only robustness-sensitive knobs

data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [170, 200]
  min_hold_days: [5, 7]

crash:
  lookback_days: [12]
  threshold: [-0.10]

risk_off:
  mode: ["SGOV_100", "SHY_100"]

trend_engine:
  mom_lookback_days: [126, 168]
  candidates:
    - ["QQQ", "SPY", "SOXX"]
  top_n: [1]

meanrev_engine:
  base: ["SPY"]
  lookback_days: [20]
  drop_threshold: [-0.10]
  hold_days: [5]
  take_profit: [0.06]
  stop_loss: [-0.06]
  candidates:
    - ["QQQ", "SPY", "SOXX"]

allocator:
  bull:
    trend: [0.70]
    meanrev: [0.00]
    defensive: [0.30]

  bear:
    trend: [0.00]
    meanrev: [0.00]
    defensive: [1.00]

  crash:
    trend: [0.00]
    meanrev: [0.00]
    defensive: [1.00]

adaptive:
  vol:
    lookback_days: [20]
    regime_window_days: [504, 756]
    high_q: [0.80]
    low_q: [0.20]

  bull_trend_weights:
    high_vol: [0.60]
    normal_vol: [0.70]
    low_vol: [0.75]

  soxx:
    block_if_high_vol: [true]
    allow_if:
      require_outperformance: [0.00]