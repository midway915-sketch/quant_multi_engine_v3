# config/grid_soxx_gate_mom_3600.yml
# soxx_gate (mom only) 60x60 = 3600 combos
# 비용 반영된 meta.py로 다시 최적값 찾기용

data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [150]
  min_hold_days: [11]

crash:
  enabled: [true]
  lookback_days: [12]
  threshold: [-0.10]
  fast:
    enabled: [true]
    lookback_days: [7]
    threshold: [-0.06]

bear_fast:
  enabled: [true]
  lookback_days: [3]
  threshold: [-0.045]

soxx_gate:
  enabled: [true]
  mode: ["mom"]

  mom_lookback_days: [85, 86, 87, 88, 89, 90, 100]

  mom_threshold: [0.020, 0.021, 0.022, 0.023, 0.024, 0.025, 0.053, 0.054, 0.055, 0.056, 0.057, 0.058, 0.059, 0.060]

risk_off:
  mode: ["SGOV_100"]

trend_engine:
  mom_lookback_days: [126]
  candidates:
    - ["QQQ", "SPY", "SOXX"]
  top_n: [1]

meanrev_engine:
  lookback_days: [20]
  drop_threshold: [-0.10]
  hold_days: [5]
  take_profit: [0.06]
  stop_loss: [-0.06]
  candidates:
    - ["QQQ", "SPY", "SOXX"]
  base: ["SPY"]

allocator:
  bull:   {trend: [1.00], meanrev: [0.00], defensive: [0.00]}
  bear:   {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
  crash:  {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
