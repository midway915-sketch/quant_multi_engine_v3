# config/grid_soxx_gate_mom_3600.yml
# soxx_gate (mom only) 60x60 = 3600 combos
# 비용 반영된 meta.py로 다시 최적값 찾기용

data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [150]
  min_hold_days: [11]

crash:
  enabled: [true]
  lookback_days: [12]
  threshold: [-0.10]
  fast:
    enabled: [true, false]
    lookback_days: [5,6,7]
    threshold: [-0.05, -0.06, -0.07]

bear_fast:
  enabled: [true, false]
  lookback_days: [2, 3, 4, 5]
  threshold: [-0.040, -0.045, -0.050, -0.055, -0.060]

soxx_gate:
  enabled: [true, false]
  mode: ["mom"]

  mom_lookback_days: [85, 87, 90, 93]

  mom_threshold: [0.012, 0.024, 0.036, 0.048]

risk_off:
  mode: ["SGOV_100"]

trend_engine:
  mom_lookback_days: [126]
  candidates:
    - ["QQQ","SPY","SOXX"]
  top_n: [1]
  leverage_mode: ["1x", "2x", "proxy_3x"] # "1x", "2x", "proxy_3x"

meanrev_engine:
  lookback_days: [20]
  drop_threshold: [-0.10]
  hold_days: [5]
  take_profit: [0.06]
  stop_loss: [-0.06]
  candidates:
    - ["QQQ", "SPY", "SOXX"]
  base: ["SPY"]

allocator:
  bull:   {trend: [1.00], meanrev: [0.00], defensive: [0.00]}
  bear:   {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
  crash:  {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
