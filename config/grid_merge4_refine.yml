# config/grid_merge4_refine.yml
# merge4 refine: crash.fast + bear_fast만 촘촘히

data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [150]
  min_hold_days: [11]

crash:
  enabled: [true]
  lookback_days: [12]
  threshold: [-0.10]
  #fast:
    #enabled: [true]
    #lookback_days: [3, 4, 5, 6]
    #threshold: [-0.06, -0.07, -0.08, -0.09]

#bear_fast:
  #enabled: [true]
  #lookback_days: [7, 10, 12, 15]
  #threshold: [-0.045, -0.05, -0.055, -0.06]

risk_off:
  mode: ["SGOV_100"]

trend_engine:
  mom_lookback_days: [126]
  candidates:
    - ["QQQ", "SPY", "SOXX"]
  top_n: [1]

meanrev_engine:
  lookback_days: [20]
  drop_threshold: [-0.10]
  hold_days: [5]
  take_profit: [0.06]
  stop_loss: [-0.06]
  candidates:
    - ["QQQ", "SPY", "SOXX"]
  base: ["SPY"]

allocator:
  bull:   {trend: [1.00], meanrev: [0.00], defensive: [0.00]}
  bear:   {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
  crash:  {trend: [0.00], meanrev: [0.00], defensive: [1.00]}