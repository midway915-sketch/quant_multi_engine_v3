data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [150]
  min_hold_days: [11]

crash:
  enabled: [true]
  lookback_days: [12]
  threshold: [-0.10]
  fast:
    enabled: [true]
    lookback_days: [6]
    threshold: [-0.06]

bear_fast:
  enabled: [true]
  lookback_days: [3, 4]
  threshold: [-0.045]

# ✅ OFF 비교를 하려면 enabled에 false를 넣어야 의미가 있음
# (enabled=false면 아래 lb/thr는 무시될 거라 낭비가 생김)
# 그래서 "OFF 1개 + ON 그리드"를 권장하지만,
# 한 번에 돌리고 싶다면 enabled [false,true]로 두자.
soxx_gate:
  enabled: [false, true]
  mode: ["mom"]
  mom_lookback_days: [80, 87, 90]
  mom_threshold: [0.012, 0.024, 0.048]

risk_off:
  mode: ["SGOV_100"]

trend_engine:
  mom_lookback_days: [126]
  candidates:
    - ["QQQ","SPY","SOXX"]
  top_n: [1]
  leverage_mode: ["proxy_3x"]   # 필요하면 ["1x","2x","proxy_3x"] 로 확장

meanrev_engine:
  base: ["SPY"]

allocator:
  bull:   {trend: [1.00], meanrev: [0.00], defensive: [0.00]}
  bear:   {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
  crash:  {trend: [0.00], meanrev: [0.00], defensive: [1.00]}