# config/grid_merge4_soxx_gate_ablation.yml

data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [150]
  min_hold_days: [11]

crash:
  enabled: [true]
  lookback_days: [12]
  threshold: [-0.10]
  fast:
    enabled: [true]
    lookback_days: [7]
    threshold: [-0.06]

bear_fast:
  enabled: [true]
  lookback_days: [3]
  threshold: [-0.045]

# ✅ NEW: SOXX 조건부 허용
soxx_gate:
  enabled: [false, true]
  mode: ["mom"]
  mom_lookback_days: [20]
  mom_threshold: [0.0]   # 20일 모멘텀 > 0이면 허용
  ma_days: [50]          # mode=ma로 바꿀 때만 사용

risk_off:
  mode: ["SGOV_100"]

trend_engine:
  mom_lookback_days: [126]
  candidates:
    - ["QQQ", "SPY", "SOXX"]
  top_n: [1]

meanrev_engine:
  lookback_days: [20]
  drop_threshold: [-0.10]
  hold_days: [5]
  take_profit: [0.06]
  stop_loss: [-0.06]
  candidates:
    - ["QQQ", "SPY", "SOXX"]
  base: ["SPY"]

allocator:
  bull:   {trend: [1.00], meanrev: [0.00], defensive: [0.00]}
  bear:   {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
  crash:  {trend: [0.00], meanrev: [0.00], defensive: [1.00]}