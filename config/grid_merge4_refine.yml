data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [170, 180, 190, 200]
  min_hold_days: [6, 7, 8, 9]

crash:
  enabled: [true]
  lookback_days: [10, 12, 14]
  threshold: [-0.03, -0.04, -0.05, -0.06]
  fast:
    enabled: [true]
    lookback_days: [4, 5, 6]
    threshold: [-0.04, -0.06, -0.08]

bear_fast:
  enabled: [true]
  lookback_days: [3]
  threshold: [-0.040, -0.045]

soxx_gate:
  enabled: [true]
  mode: ["mom"]
  mom_lookback_days: [90, 100]
  mom_threshold: [0.030, 0.050, 0.060]

risk_off:
  mode: ["SGOV_100"]

trend_engine:
  mom_lookback_days: [130]
  candidates:
    - ["QQQ","SPY","SOXX"]
  top_n: [1]
  leverage_mode: ["proxy_3x"]   # 필요하면 ["1x","2x","proxy_3x"] 로 확장

meanrev_engine:
  base: ["SPY"]

allocator:
  bull:   {trend: [1.00], meanrev: [0.00], defensive: [0.00]}
  bear:   {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
  crash:  {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
