data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [150]
  min_hold_days: [11]

# 전체 시장 상태용 crash (기존 유지)
crash:
  enabled: [true]
  lookback_days: [12]
  threshold: [-0.08]
  fast:
    enabled: [true]
    lookback_days: [6]
    threshold: [-0.06]

bear_fast:
  enabled: [true]
  lookback_days: [4]
  threshold: [-0.045]

soxx_gate:
  enabled: [true]
  mode: ["mom"]
  mom_lookback_days: [87]
  mom_threshold: [0.024]

risk_off:
  mode: ["SGOV_100"]

trend_engine:
  mom_lookback_days: [130]
  candidates:
    - ["QQQ","SPY","SOXX"]
  top_n: [1]
  leverage_mode: ["proxy_3x"]

meanrev_engine:
  base: ["SPY"]

asset_crash:
  spy:
    enabled: [true]
    lookback_days: [10, 12, 15]
    threshold: [-0.07, -0.08, -0.10]

  qqq:
    enabled: [true]
    lookback_days: [8, 10, 12]
    threshold: [-0.08, -0.10, -0.12]

  soxx:
    enabled: [true]
    lookback_days: [4, 6, 8]
    threshold: [-0.10, -0.12, -0.15]

allocator:
  bull:   {trend: [1.00], meanrev: [0.00], defensive: [0.00]}
  bear:   {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
  crash:  {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
