data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [150]
  min_hold_days: [11]

# 전체 시장 상태용 crash (기존 유지)
crash:
  enabled: [true]
  lookback_days: [12]
  threshold: [-0.08]
  fast:
    enabled: [true]
    lookback_days: [6]
    threshold: [-0.06]

bear_fast:
  enabled: [true]
  lookback_days: [4]
  threshold: [-0.045]

soxx_gate:
  enabled: [true]
  mode: ["mom"]
  mom_lookback_days: [87]
  mom_threshold: [0.024]

risk_off:
  mode: ["SGOV_100"]

trend_engine:
  mom_lookback_days: [130]
  candidates:
    - ["QQQ","SPY","SOXX"]
  top_n: [1]
  leverage_mode: ["proxy_3x"]

meanrev_engine:
  base: ["SPY"]

# 현재 실제 보유 자산별 개별 crush override
# - global crash와 별개로 동작
# - 현재 보유 중인 자산의 underlying 기준으로만 적용
asset_crash:
  spy:
    enabled: [true, false]
    lookback_days: [12]
    threshold: [-0.08]

  qqq:
    enabled: [true, false]
    lookback_days: [12]
    threshold: [-0.08]

  soxx:
    enabled: [true, false]
    lookback_days: [12]
    threshold: [-0.08]

allocator:
  bull:   {trend: [1.00], meanrev: [0.00], defensive: [0.00]}
  bear:   {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
  crash:  {trend: [0.00], meanrev: [0.00], defensive: [1.00]}