data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [150, 170, 180, 190, 200]
  min_hold_days: [5, 6, 7, 8, 9]

crash:
  enabled: [true]
  lookback_days: [10, 12, 14]
  threshold: [-0.08, -0.10, -0.12]
  fast:
    enabled: [true]
    lookback_days: [4, 5, 6]
    threshold: [-0.04, -0.06, -0.08]

bear_fast:
  enabled: [true]
  lookback_days: [4, 5, 6]
  threshold: [-0.02, -0.045, -0.07]

soxx_gate:
  enabled: [true]
  mode: ["mom"]
  mom_lookback_days: [80, 90]
  mom_threshold: [0.010, 0.020, 0.030]

risk_off:
  mode: ["SGOV_100"]

trend_engine:
  mom_lookback_days: [120, 126, 130]
  candidates:
    - ["QQQ","SPY","SOXX"]
  top_n: [1]
  leverage_mode: ["proxy_3x"]   # 필요하면 ["1x","2x","proxy_3x"] 로 확장

meanrev_engine:
  base: ["SPY"]

allocator:
  bull:   {trend: [1.00], meanrev: [0.00], defensive: [0.00]}
  bear:   {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
  crash:  {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
