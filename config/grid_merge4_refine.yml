  lookback_days: [12]
  threshold: [-0.08]
  fast:
    enabled: [true]
    lookback_days: [6]
    threshold: [-0.06]

bear_fast:
  enabled: [true]
  lookback_days: [4]
  threshold: [-0.045]

soxx_gate:
  enabled: [true]
  mode: ["mom"]
  mom_lookback_days: [87]
  mom_threshold: [0.024]

soxx_crash:
  enabled: [true]
  lookback_days: [5, 7, 9, 11, 13, 15, 17, 20]
  threshold: [-0.08, -0.10, -0.12, -0.14, -0.16, -0.18, -0.20]

risk_off:
