# config/grid_fast.yml  (SOXX removed + base=SPY fixed)

data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [200, 250]
  min_hold_days: [0, 5]

crash:
  lookback_days: [20]
  threshold: [-0.12, -0.15]

risk_off:
  mode: ["SHY_100", "SHY_70_GLD_30"]

trend_engine:
  mom_lookback_days: [126, 168]
  candidates:
    - ["QQQ", "SPY"]
  top_n: [1]

meanrev_engine:
  lookback_days: [20]
  drop_threshold: [-0.12, -0.15]
  hold_days: [5, 10]
  take_profit: [0.08]
  stop_loss: [-0.08]
  candidates:
    - ["QQQ", "SPY"]
  base: ["SPY"]   # ✅ 고정

allocator:
  bull:
    trend: [0.7, 0.8]
    meanrev: [0.1]
    defensive: [0.2, 0.1]

  bear:
    trend: [0.35, 0.50]
    meanrev: [0.15]
    defensive: [0.50, 0.40]

  crash:
    trend: [0.00]
    meanrev: [0.00, 0.10]
    defensive: [1.00, 0.90]