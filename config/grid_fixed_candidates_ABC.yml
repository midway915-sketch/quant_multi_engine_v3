# config/grid_fixed_candidates_ABC.yml
# A/B/C 고정 후보 3개만 비교

data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [150]
  min_hold_days: [11]

crash:
  enabled: [true]
  lookback_days: [12]
  threshold: [-0.10]
  fast:
    enabled: [true]
    lookback_days: [6]
    threshold: [-0.06]

bear_fast:
  enabled: [true]
  lookback_days: [3, 4]        # A/B=3, C=4
  threshold: [-0.045]

soxx_gate:
  enabled: [true]
  mode: ["mom"]
  mom_lookback_days: [80, 87, 90]     # A=80, C=87, B=90
  mom_threshold: [0.012, 0.024, 0.048] # A=0.012, C=0.024, B=0.048

risk_off:
  mode: ["SGOV_100"]

trend_engine:
  mom_lookback_days: [126]
  candidates:
    - ["QQQ","SPY","SOXX"]
  top_n: [1]
  leverage_mode: ["proxy_3x"]

meanrev_engine:
  base: ["SPY"]

allocator:
  bull:   {trend: [1.00], meanrev: [0.00], defensive: [0.00]}
  bear:   {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
  crash:  {trend: [0.00], meanrev: [0.00], defensive: [1.00]}