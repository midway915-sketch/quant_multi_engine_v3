mode: "dry_run"   # dry_run | live (live는 주문모듈 붙인 뒤)

timezone: "Asia/Seoul"

schedule:
  rebalance: "monthly"
  # 월말 마지막 거래일 "장마감(MOC)" 실행이 목표면 last_trading_day_close
  when: "last_trading_day_close"   # last_trading_day_close | first_trading_day_open

universe:
  candidates: ["QQQ", "SPY", "SOXX"]
  defensive: "SGOV"
  trade_map:
    QQQ: "TQQQ"
    SPY: "UPRO"
    SOXX: "SOXL"

strategy:
  base_ticker: "SPY"
  ma_days: 150
  min_hold_days: 11

  crash:
    lookback_days: 12
    threshold: -0.10

  trend_engine:
    mom_lookback_days: 126
    top_n: 1

allocator:
  bull:
    trend: 0.75
    defensive: 0.25
  bear:
    trend: 0.0
    defensive: 1.0
  crash:
    trend: 0.0
    defensive: 1.0

execution:
  order_type: "MOC"        # KIS 미국주식: MOC=33
  # MOC로 보낼 거면 "장마감 직전(예: 5~10분 전)"에 스케줄링해야 함
  # 스케줄링은 cron/systemd에서 처리 (코드는 날짜 판단만)

data:
  # 라이브는 MIX 없이 "실티커"만 다운로드
  tickers:
    - QQQ
    - SPY
    - SOXX
    - TQQQ
    - UPRO
    - SOXL
    - SGOV

notify:
  telegram:
    enabled: true
    bot_token_env: "TG_BOT_TOKEN"
    chat_id_env: "TG_CHAT_ID"

paths:
  state_dir: "out/live_state"
  out_dir: "out/live_runs"