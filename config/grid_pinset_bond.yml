# config/grid_pinset_bond.yml
# Pinset + bond_gate(C안) grid

data:
  prices_start: ["2000-01-01"]

state:
  base_ticker: ["SPY"]
  ma_days: [150]
  min_hold_days: [11]
  hold_mode: ["both"]          # 우선 both 고정(2022 핀셋 효과 보기)
  reentry_hold_days: [0, 1, 2] # (hold_mode=both에서는 무시되지만, 나중 확장 대비)

crash:
  enabled: [true]
  lookback_days: [12]
  threshold: [-0.10]
  fast:
    enabled: [true]
    lookback_days: [4, 5]
    threshold: [-0.07, -0.08]

bear_fast:
  enabled: [true]
  lookback_days: [10, 15]
  threshold: [-0.04, -0.05]

# ✅ NEW: bond_gate (C안 2단계 게이트)
bond_gate:
  enabled: [true]
  ticker: ["TLT"]
  lookback_days: [42, 63, 84]
  threshold: [0.0, 0.02]

risk_off:
  mode: ["SGOV_100"]

trend_engine:
  mom_lookback_days: [126]
  candidates:
    - ["QQQ", "SPY", "SOXX"]
  top_n: [1]

meanrev_engine:
  lookback_days: [20]
  drop_threshold: [-0.10]
  hold_days: [5]
  take_profit: [0.06]
  stop_loss: [-0.06]
  candidates:
    - ["QQQ", "SPY", "SOXX"]
  base: ["SPY"]

allocator:
  bull:   {trend: [1.00], meanrev: [0.00], defensive: [0.00]}
  bear:   {trend: [0.00], meanrev: [0.00], defensive: [1.00]}
  crash:  {trend: [0.00], meanrev: [0.00], defensive: [1.00]}