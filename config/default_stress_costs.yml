# config/default_stress_biweekly.yml
# 기존 default_stress_costs.yml 복사 + 리밸런스만 biweekly

data:
  tickers: ["SPY","QQQ","SOXX","SHY","GLD"]
  start: "2000-01-01"

portfolio:
  rebalance: "quarterly"
  when: "week_end"
  entry: "next_close"

state:
  base_ticker: "SPY"
  ma_days: 150
  min_hold_days: 11

crash:
  enabled: true
  lookback_days: 12
  threshold: -0.10

risk_off:
  mode: "SGOV_100"

trend_engine:
  universe: ["QQQ","SPY","SOXX"]
  mom_lookback_days: 126
  top_n: 1
  leverage_mode: "proxy_3x"

meanrev_engine:
  base_ticker: "SPY"
  lookback_days: 20
  drop_threshold: -0.10
  hold_days: 5
  take_profit: 0.06
  stop_loss: -0.06
  leverage: 1.5

defensive_engine:
  mode: "SGOV"

allocator:
  bull:   {trend: 0.75, meanrev: 0.00, defensive: 0.25}
  bear:   {trend: 0.00, meanrev: 0.00, defensive: 1.00}
  crash:  {trend: 0.00, meanrev: 0.00, defensive: 1.00}

costs:
  buy: 0.0020
  sell: 0.0020

debug:
  state: false