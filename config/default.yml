data:
  # Base universe (UNLEVERED tickers only)
  tickers: ["QQQ","SPY","TLT","GLD","SHY","SOXX"]
  start: "2000-01-01"

portfolio:
  rebalance: "weekly"
  when: "week_end"      # W-FRI
  entry: "next_close"   # signals at t used for holdings from t+1 (implemented via shift)

selection:
  top_n: 2
  lookback_days: 126

regime:
  enabled: true
  ma_fast: 50
  ma_slow: 200

risk_off:
  enabled: true
  mode: "SHY_70_GLD_30"   # SHY_100, SHY_GLD_50_50, SHY_70_GLD_30, GLD_100

# NEW/UPDATED: leveraged execution options
leverage_etf:
  enabled: true
  # "real"  = use actual 3x ETFs (TQQQ/UPRO/TMF...) => will shorten history
  # "proxy" = synthesize 3x series from base tickers (daily return * 3) => 2000+ history
  mode: "proxy"

  use_3x_in_strong: true
  use_3x_in_weak: false

  # base -> traded ticker mapping
  # In proxy mode, tickers ending with _PROXY are created synthetically from the base ticker.
  map:
    QQQ: "TQQQ_PROXY"
    SPY: "UPRO_PROXY"
    TLT: "TMF_PROXY"
    SOXX: "SOXL_PROXY"