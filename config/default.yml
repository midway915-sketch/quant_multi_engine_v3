data:
  tickers: ["SPY","QQQ","SOXX","SHY","GLD"]
  start: "2000-01-01"
  end: "2025-03-21"

portfolio:
  rebalance: "weekly"
  when: "week_end"      # W-FRI
  entry: "next_close"   # signals at t used from t+1

state:
  base_ticker: "SPY"
  ma_days: 150
  min_hold_days: 11

crash:
  enabled: true
  lookback_days: 12
  threshold: -0.10

trend_engine:
  universe: ["QQQ","SPY","SOXX"]
  mom_lookback_days: 126
  top_n: 1
  leverage_mode: "proxy_3x"

meanrev_engine:
  base_ticker: "SPY"
  lookback_days: 20
  drop_threshold: -0.10
  hold_days: 5
  take_profit: 0.06
  stop_loss: -0.06
  leverage: 1

defensive_engine:
  mode: "SGOV_100"

allocator:
  bull:   {trend: 0.75, meanrev: 0.00, defensive: 0.25}
  bear:   {trend: 0.00, meanrev: 0.00, defensive: 1.00}
  crash:  {trend: 0.00, meanrev: 0.00, defensive: 1.00}

costs:
  buy: 0.0014
  sell: 0.0014

debug:
  state: false
