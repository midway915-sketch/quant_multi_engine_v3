data:
  tickers: ["SPY","QQQ","SOXX","SHY","GLD"]
  start: "2000-01-01"
  end: "2009-12-31"

portfolio:
  rebalance: "weekly"
  when: "week_end"      # W-FRI
  entry: "next_close"   # signals at t used from t+1

state:
  base_ticker: "SPY"
  ma_days: 200
  min_hold_days: 5

crash:
  enabled: true
  lookback_days: 20
  threshold: -0.15

trend_engine:
  universe: ["QQQ","SPY","SOXX"]
  mom_lookback_days: 126
  top_n: 1
  leverage_mode: "proxy_3x"

meanrev_engine:
  base_ticker: "SPY"
  lookback_days: 20
  drop_threshold: -0.15
  hold_days: 10
  take_profit: 0.10
  stop_loss: -0.08
  leverage: 1.5

defensive_engine:
  mode: "SHY_100"

allocator:
  bull:   {trend: 0.70, meanrev: 0.10, defensive: 0.20}
  bear:   {trend: 0.35, meanrev: 0.15, defensive: 0.50}
  crash:  {trend: 0.10, meanrev: 0.40, defensive: 0.50}

costs:
  buy: 0.0014
  sell: 0.0014

debug:
  state: false